name: iris_app
description: "Iris - Asistente Visual para personas con discapacidad visual. PoC Android."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # Control de la cámara del dispositivo
  camera: ^0.11.1

  # Síntesis de voz nativa (Text-to-Speech)
  flutter_tts: ^4.2.0

  # Peticiones HTTP para la API de visión
  http: ^1.3.0

  # Retroalimentación háptica (vibración)
  vibration: ^3.1.8

  # Codificación de imágenes a base64
  image: ^4.5.3
  flutter_image_compress: ^2.4.0
  speech_to_text: ^7.4.0
  permission_handler: ^12.0.1
  flutter_dotenv: ^6.0.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/
    - .env

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/logo.png"
  min_sdk_android: 21
